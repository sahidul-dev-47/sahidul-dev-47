name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # runs once every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: sahidul-dev-47

          # This is the critical line — without it, metrics is generated
          # but never actually pushed/committed to the repository
          output_action: commit
          committer_message: "Update GitHub metrics [skip ci]"

          # Overall layout
          template: classic
          base: header, activity, community, repositories, metadata

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_load: 300
          plugin_languages_threshold: 0%

          # Lines of code changed
          plugin_lines: yes

          config_timezone: Asia/Dhaka
